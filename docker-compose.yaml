version: "3.8"

services:
 db:
   image: postgres:15
   container_name: chat-application
   restart: always
   environment:
     POSTGRES_USER: chat_application_user
     POSTGRES_PASSWORD: chat_application_password
     POSTGRES_DB: chat-application_db
   ports:
     - "5434:5432"
   volumes:
     - postgres_data:/var/lib/postgresql/data

volumes:
 postgres_data:
